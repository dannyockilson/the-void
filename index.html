<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#010005">
  <meta name="description" content="Scream into the void.">

  <!-- PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Void">

  <link rel="manifest" href="manifest.json">

  <title>The Void</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #010005;
    }

    #void {
      display: block;
      width: 100%;
      height: 100%;
      background-color: #010005;
    }
  </style>
</head>
<body>
  <canvas id="void"></canvas>

  <script>
    const canvas = document.getElementById('void');
    const ctx = canvas.getContext('2d');

    let audioCtx = null;
    let analyser = null;
    let micStream = null;
    let audioMode = 'uninitialised'; // 'uninitialised' | 'active' | 'synth-fallback'

    function getRMSVolume(analyserNode) {
      const data = new Float32Array(analyserNode.fftSize);
      analyserNode.getFloatTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
      return Math.sqrt(sum / data.length);
    }

    async function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new AudioContext();
        await audioCtx.resume(); // required for Safari and Chrome
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
          }
        });
        micStream = stream;
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.8;
        source.connect(analyser);
        audioMode = 'active';
        console.log('[void] audio pipeline active');
      } catch (err) {
        console.warn('[void] mic unavailable, switching to synth fallback:', err.name);
        audioMode = 'synth-fallback';
      }
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);
    }

    window.addEventListener('resize', resize);
    resize();

    canvas.addEventListener('click', initAudio, { once: true });

    function render() {
      // Clear canvas with void background
      ctx.fillStyle = '#010005';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // T2: log real-time audio levels when pipeline is active
      if (audioMode === 'active' && analyser) {
        console.log('[void] rms:', getRMSVolume(analyser).toFixed(4));
      }
      // T5: Ripple rendering will go here

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
