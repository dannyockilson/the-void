<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#010005">
  <meta name="description" content="Scream into the void.">

  <!-- PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Void">

  <link rel="manifest" href="manifest.json">

  <title>The Void</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #010005;
    }

    #void {
      display: block;
      width: 100%;
      height: 100%;
      background-color: #010005;
    }
  </style>
</head>
<body>
  <canvas id="void"></canvas>

  <script>
    const canvas = document.getElementById('void');
    const ctx = canvas.getContext('2d');

    let audioCtx = null;
    let analyser = null;
    let micStream = null;
    let audioMode = 'uninitialised'; // 'uninitialised' | 'active' | 'synth-fallback'
    let echoMasterGain = null;

    // T4: Volume analysis & normalisation state
    const CALIBRATION_DURATION_MS = 1500;
    const EMA_ALPHA = 0.15; // smoothing factor (lower = smoother)
    const SCREAM_ON_THRESHOLD = 0.6;  // normalised volume to trigger scream
    const SCREAM_OFF_THRESHOLD = 0.35; // hysteresis: scream ends below this

    let calibrationSamples = [];
    let calibrationEndTime = null;
    let ambientBaseline = null;
    let smoothedRMS = 0;
    let normalisedVolume = 0; // 0-1, reactive output
    let isScreaming = false;

    // T5: Ripple visualisation state
    const ripples = [];
    const RING_LIFETIME_MS = 2500;
    const RING_EXPAND_SPEED = 180; // logical px per second
    const MAX_RINGS = 12;
    const WOBBLE_FREQ_BASE = 8;
    let prevIsScreaming = false;

    function getRMSVolume(analyserNode) {
      const data = new Float32Array(analyserNode.fftSize);
      analyserNode.getFloatTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
      return Math.sqrt(sum / data.length);
    }

    function updateVolumeAnalysis() {
      if (!analyser) return;
      const rms = getRMSVolume(analyser);
      const now = performance.now();

      // Calibration phase: collect ambient samples for first CALIBRATION_DURATION_MS
      if (calibrationEndTime === null) {
        calibrationEndTime = now + CALIBRATION_DURATION_MS;
      }
      if (now < calibrationEndTime) {
        calibrationSamples.push(rms);
        smoothedRMS = rms; // no smoothing yet during calibration
        return;
      }

      // Compute baseline once calibration window closes
      if (ambientBaseline === null) {
        const sum = calibrationSamples.reduce((a, b) => a + b, 0);
        ambientBaseline = sum / calibrationSamples.length || 0.001;
        console.log('[void] ambient baseline:', ambientBaseline.toFixed(4));
      }

      // EMA smoothing
      smoothedRMS = EMA_ALPHA * rms + (1 - EMA_ALPHA) * smoothedRMS;

      // Normalise: map [baseline, clamp ceiling] → [0, 1]
      // A scream is typically 10-20x the ambient RMS, so ceiling at 20x baseline
      const ceiling = ambientBaseline * 20;
      normalisedVolume = Math.min(1, Math.max(0, (smoothedRMS - ambientBaseline) / (ceiling - ambientBaseline)));

      // Peak detection with hysteresis
      if (!isScreaming && normalisedVolume >= SCREAM_ON_THRESHOLD) {
        isScreaming = true;
        console.log('[void] scream started, normalised:', normalisedVolume.toFixed(3));
      } else if (isScreaming && normalisedVolume < SCREAM_OFF_THRESHOLD) {
        isScreaming = false;
        console.log('[void] scream ended');
      }
    }

    // T5: Ripple helpers

    function spawnRipple(amplitude) {
      if (ripples.length >= MAX_RINGS) ripples.shift(); // drop oldest if at cap
      ripples.push({
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        startRadius: 4 + amplitude * 20, // slightly larger spawn for louder screams
        amplitude,
        birthTime: performance.now(),
        wobbleOffset: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.8 + Math.random() * 0.6,
      });
    }

    function getRippleColour(amplitude, opacity) {
      // Dark purple (quiet) → bright blue-violet (loud)
      const r = Math.round(10 + amplitude * 60);
      const g = Math.round(amplitude * 10);
      const b = Math.round(80 + amplitude * 175);
      return `rgba(${r},${g},${b},${opacity.toFixed(3)})`;
    }

    function drawRipples(timestamp) {
      for (let i = ripples.length - 1; i >= 0; i--) {
        const ring = ripples[i];
        const age = timestamp - ring.birthTime;
        const progress = age / RING_LIFETIME_MS;

        if (progress >= 1) {
          ripples.splice(i, 1);
          continue;
        }

        const eased = 1 - Math.pow(1 - progress, 2); // ease-out expansion
        const radius = ring.startRadius + RING_EXPAND_SPEED * (age / 1000);
        const opacity = (1 - eased) * (0.4 + ring.amplitude * 0.6);
        const thickness = 1.5 + ring.amplitude * 3 * (1 - progress);
        const wobbleAmp = ring.amplitude * 7 * (1 - progress);
        const wobbleFreq = WOBBLE_FREQ_BASE + Math.round(ring.amplitude * 6);

        ctx.beginPath();
        ctx.lineWidth = thickness;
        ctx.strokeStyle = getRippleColour(ring.amplitude, opacity);

        const steps = 120;
        for (let s = 0; s <= steps; s++) {
          const angle = (s / steps) * Math.PI * 2;
          const wobble = Math.sin(angle * wobbleFreq + ring.wobbleOffset + timestamp * ring.wobbleSpeed * 0.001) * wobbleAmp;
          const r = radius + wobble;
          const x = ring.x + Math.cos(angle) * r;
          const y = ring.y + Math.sin(angle) * r;
          s === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }

    function synthesiseIR(audioCtx) {
      const duration = 3.5;
      const sampleRate = audioCtx.sampleRate;
      const length = Math.floor(sampleRate * duration);
      const buffer = audioCtx.createBuffer(2, length, sampleRate);
      for (let c = 0; c < 2; c++) {
        const data = buffer.getChannelData(c);
        for (let i = 0; i < length; i++) {
          const t = i / sampleRate;
          const decay = Math.exp(-2.5 * t);
          const density = t < 0.05 ? 1.5 : 1.0;
          data[i] = (Math.random() * 2 - 1) * decay * density;
        }
      }
      return buffer;
    }

    function setupEchoChain(audioCtx, source) {
      const NUM_TAPS = 4;
      const TAP_INTERVAL = 0.3;

      const convolverInput = audioCtx.createGain();
      const convolver = audioCtx.createConvolver();
      convolver.buffer = synthesiseIR(audioCtx);
      const masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.8;

      for (let i = 0; i < NUM_TAPS; i++) {
        const delay = audioCtx.createDelay(5.0);
        delay.delayTime.value = TAP_INTERVAL * (i + 1);

        const tapGain = audioCtx.createGain();
        tapGain.gain.value = Math.pow(0.5, i + 1);

        source.connect(delay);
        delay.connect(tapGain);
        tapGain.connect(convolverInput);
      }

      convolverInput.connect(convolver);
      convolver.connect(masterGain);
      masterGain.connect(audioCtx.destination);

      return masterGain;
    }

    async function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new AudioContext();
        await audioCtx.resume(); // required for Safari and Chrome
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
          }
        });
        micStream = stream;
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.8;
        source.connect(analyser);
        echoMasterGain = setupEchoChain(audioCtx, source);
        audioMode = 'active';
        console.log('[void] audio pipeline active');
      } catch (err) {
        console.warn('[void] mic unavailable, switching to synth fallback:', err.name);
        audioMode = 'synth-fallback';
      }
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);
    }

    window.addEventListener('resize', resize);
    resize();

    canvas.addEventListener('click', initAudio, { once: true });

    function render(timestamp) {
      // Clear canvas with void background
      ctx.fillStyle = '#010005';
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      // T4: volume analysis – updates smoothedRMS, normalisedVolume, isScreaming
      if (audioMode === 'active') {
        updateVolumeAnalysis();
        if (ambientBaseline !== null) {
          console.log('[void] normalised:', normalisedVolume.toFixed(3), 'screaming:', isScreaming);
        }
      }

      // T5: spawn ripple on scream onset (rising edge)
      if (isScreaming && !prevIsScreaming) {
        spawnRipple(normalisedVolume);
      }
      prevIsScreaming = isScreaming;

      // T5: draw active ripple rings
      drawRipples(timestamp);

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
