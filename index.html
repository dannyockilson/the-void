<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#010005">
  <meta name="description" content="Scream into the void.">

  <!-- PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Void">

  <link rel="manifest" href="manifest.json">

  <title>The Void</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #010005;
    }

    #void {
      display: block;
      width: 100%;
      height: 100%;
      background-color: #010005;
    }

    /* T6: first-visit overlay */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4em;
      pointer-events: none; /* let clicks fall through to canvas */
    }

    #overlay p {
      color: #1a1a2e;
      font-family: sans-serif;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      letter-spacing: 0.22em;
      text-align: center;
      opacity: 0;
      margin: 0;
    }
  </style>
</head>
<body>
  <canvas id="void"></canvas>

  <div id="overlay">
    <p id="line1"></p>
    <p id="line2"></p>
  </div>

  <script>
    const canvas = document.getElementById('void');
    const ctx = canvas.getContext('2d');
    const line1 = document.getElementById('line1');
    const line2 = document.getElementById('line2');

    let audioCtx = null;
    let analyser = null;
    let micStream = null;
    let audioMode = 'uninitialised'; // 'uninitialised' | 'active' | 'synth-fallback'
    let echoMasterGain = null;
    let synthEchoInput = null; // T7: entry point for synth bursts into echo chain
    let humOscillator = null;  // T10: stored so silence detection can ramp pitch

    // T4: Volume analysis & normalisation state
    const CALIBRATION_DURATION_MS = 1500;
    const EMA_ALPHA = 0.15; // smoothing factor (lower = smoother)
    const SCREAM_ON_THRESHOLD = 0.4;  // normalised volume to trigger scream
    const SCREAM_OFF_THRESHOLD = 0.25; // hysteresis: scream ends below this

    let calibrationSamples = [];
    let calibrationEndTime = null;
    let ambientBaseline = null;
    let smoothedRMS = 0;
    let normalisedVolume = 0; // 0-1, reactive output
    let isScreaming = false;

    // T5: Ripple visualisation state
    const ripples = [];
    const RING_LIFETIME_MS = 2500;
    const RING_EXPAND_SPEED = 180; // logical px per second
    const MAX_RINGS = 12;
    const WOBBLE_FREQ_BASE = 8;
    let prevIsScreaming = false;

    // T9: Haptic feedback
    const HAPTICS_SUPPORTED = 'vibrate' in navigator;

    // Scream haptic: echo-decay pattern mirrors the 4-tap delay chain
    function vibrateScream(amplitude) {
      if (!HAPTICS_SUPPORTED) return;
      const base = Math.round(50 + amplitude * 250); // 50–300ms base tap
      navigator.vibrate([
        base,
        180,
        Math.round(base * 0.5),
        180,
        Math.round(base * 0.25),
        180,
        Math.round(base * 0.12),
      ]);
    }

    // Milestone haptic: distinct triple-pulse for when the void cracks open (T11)
    function vibrateMilestone() {
      if (!HAPTICS_SUPPORTED) return;
      navigator.vibrate([200, 60, 120, 60, 200]);
    }

    // Void breath haptic: single subtle pulse, for T10 silence response
    function vibrateBreath() {
      if (!HAPTICS_SUPPORTED) return;
      navigator.vibrate([30]);
    }

    // T10: Silence detection & response
    const SILENCE_ONSET_MS = 30000;   // silence factor starts rising after 30s
    const SILENCE_PEAK_MS  = 60000;   // reaches full effect at 60s
    const SILENCE_RESET_THRESHOLD = 0.05; // normalised volume above this = not silent
    const SILENCE_BREATH_INTERVAL_MS = 14000; // inward ripple every 14s of deep silence
    const HUM_FREQ_BASE  = 48;  // Hz at idle
    const HUM_FREQ_TENSE = 72;  // Hz at peak silence

    let lastSoundTime   = performance.now(); // resets whenever sound detected
    let silenceFactor   = 0;  // 0 = active, 1 = deep silence
    let lastBreathTime  = 0;  // timestamp of last void-breath ripple

    function updateSilenceFactor(timestamp) {
      const silencedMs = timestamp - lastSoundTime;
      const target = Math.min(1, Math.max(0,
        (silencedMs - SILENCE_ONSET_MS) / (SILENCE_PEAK_MS - SILENCE_ONSET_MS)
      ));
      // Smooth lerp: gradual onset, quick reset
      silenceFactor += (target - silenceFactor) * 0.015;

      // Ramp hum oscillator pitch
      if (humOscillator && audioCtx) {
        const targetFreq = HUM_FREQ_BASE + silenceFactor * (HUM_FREQ_TENSE - HUM_FREQ_BASE);
        humOscillator.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 2.0);
      }
    }

    // T8: Ambient idle state
    const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const PARTICLE_COUNT = 55;
    const particles = [];

    function initParticles() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          radius: 1.0 + Math.random() * 1.8,
          opacity: 0.06 + Math.random() * 0.10,
          phase: Math.random() * Math.PI * 2,
        });
      }
    }
    initParticles();

    // T6: First visit flow
    const IS_RETURNING = Boolean(localStorage.getItem('void:visited'));

    function setLineOpacity(el, opacity, durationMs) {
      el.style.transition = REDUCED_MOTION ? 'none' : `opacity ${durationMs}ms ease`;
      el.style.opacity = opacity;
    }

    function showOverlayIntro() {
      line1.textContent = 'the void is listening';
      line2.textContent = 'it needs your voice';
      setLineOpacity(line1, 1, 2500);
      setTimeout(() => setLineOpacity(line2, 1, 2500), 1000);
    }

    function hideOverlay(onDone) {
      setLineOpacity(line1, 0, 1000);
      setLineOpacity(line2, 0, 1000);
      setTimeout(() => {
        document.getElementById('overlay').style.display = 'none';
        if (onDone) onDone();
      }, 1000);
    }

    function showSynthOverlay() {
      // Crossfade to synth message
      setLineOpacity(line1, 0, 700);
      setLineOpacity(line2, 0, 700);
      setTimeout(() => {
        line1.textContent = 'the void can still feel you';
        line2.textContent = 'tap to reach it';
        setLineOpacity(line1, 1, 2000);
        setTimeout(() => setLineOpacity(line2, 1, 2000), 800);
      }, 700);
    }

    function onPermissionGranted() {
      try { localStorage.setItem('void:visited', '1'); } catch (_) {}
      if (!IS_RETURNING) hideOverlay();
    }

    function onPermissionDenied() {
      showSynthOverlay();
      addSynthTapHandler();
    }

    // Show intro text for first-time visitors
    if (!IS_RETURNING) showOverlayIntro();

    function getRMSVolume(analyserNode) {
      const data = new Float32Array(analyserNode.fftSize);
      analyserNode.getFloatTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
      return Math.sqrt(sum / data.length);
    }

    function updateVolumeAnalysis() {
      if (!analyser) return;
      const rms = getRMSVolume(analyser);
      const now = performance.now();

      // Calibration phase: collect ambient samples for first CALIBRATION_DURATION_MS
      if (calibrationEndTime === null) {
        calibrationEndTime = now + CALIBRATION_DURATION_MS;
      }
      if (now < calibrationEndTime) {
        calibrationSamples.push(rms);
        smoothedRMS = rms; // no smoothing yet during calibration
        return;
      }

      // Compute baseline once calibration window closes
      if (ambientBaseline === null) {
        const sum = calibrationSamples.reduce((a, b) => a + b, 0);
        ambientBaseline = sum / calibrationSamples.length || 0.001;
        console.log('[void] ambient baseline:', ambientBaseline.toFixed(4));
      }

      // EMA smoothing
      smoothedRMS = EMA_ALPHA * rms + (1 - EMA_ALPHA) * smoothedRMS;

      // Normalise: map [baseline, clamp ceiling] → [0, 1]
      // A scream is typically 10-20x the ambient RMS, so ceiling at 20x baseline
      const ceiling = ambientBaseline * 20;
      normalisedVolume = Math.min(1, Math.max(0, (smoothedRMS - ambientBaseline) / (ceiling - ambientBaseline)));

      // T10: reset silence timer on any detectable sound
      if (normalisedVolume > SILENCE_RESET_THRESHOLD) {
        lastSoundTime = performance.now();
      }

      // Peak detection with hysteresis
      if (!isScreaming && normalisedVolume >= SCREAM_ON_THRESHOLD) {
        isScreaming = true;
        console.log('[void] scream started, normalised:', normalisedVolume.toFixed(3));
      } else if (isScreaming && normalisedVolume < SCREAM_OFF_THRESHOLD) {
        isScreaming = false;
        console.log('[void] scream ended');
      }
    }

    // T8: Ambient helpers

    function drawParticles(timestamp) {
      const t = timestamp * 0.001;
      const w = window.innerWidth;
      const h = window.innerHeight;
      for (const p of particles) {
        if (!REDUCED_MOTION) {
          const speedMult = 1 + silenceFactor * 3; // T10: particles accelerate in silence
          p.x = (p.x + p.vx * speedMult + w) % w;
          p.y = (p.y + p.vy * speedMult + h) % h;
        }
        const pulse = REDUCED_MOTION ? 1 : (0.7 + 0.3 * Math.sin(t * 0.3 + p.phase));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(90,30,130,${(p.opacity * pulse).toFixed(3)})`;
        ctx.fill();
      }
    }

    function setupAmbientHum(actx) {
      const hum = actx.createOscillator();
      humOscillator = hum; // T10: store ref for silence-pitch ramp
      hum.type = 'sine';
      hum.frequency.value = HUM_FREQ_BASE;
      const humGain = actx.createGain();
      humGain.gain.value = 0.018; // very quiet
      hum.connect(humGain);
      humGain.connect(actx.destination);
      hum.start();
    }

    // Draws a radial glow at centre — visible at any volume above ambient
    function drawCenterGlow() {
      const vol = audioMode === 'active' ? normalisedVolume : 0;
      const intensity = Math.max(vol, silenceFactor * 0.15); // also pulses faintly in silence
      if (intensity < 0.01) return;
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const r = 30 + intensity * 120;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      grad.addColorStop(0, `rgba(100,30,210,${Math.min(0.7, intensity * 0.9).toFixed(3)})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // T5: Ripple helpers

    // direction: 1 = expand outward (scream), -1 = contract inward (void breath)
    function spawnRipple(amplitude, direction = 1) {
      if (ripples.length >= MAX_RINGS) ripples.shift(); // drop oldest if at cap
      const shortSide = Math.min(window.innerWidth, window.innerHeight);
      ripples.push({
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        startRadius: direction === 1
          ? 4 + amplitude * 20
          : shortSide * 0.46, // T10: inward rings start near the edge
        amplitude,
        direction,
        birthTime: performance.now(),
        wobbleOffset: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.8 + Math.random() * 0.6,
      });
    }

    function getRippleColour(amplitude, opacity) {
      // Dark purple (quiet) → bright blue-violet (loud)
      const r = Math.round(10 + amplitude * 60);
      const g = Math.round(amplitude * 10);
      const b = Math.round(80 + amplitude * 175);
      return `rgba(${r},${g},${b},${opacity.toFixed(3)})`;
    }

    function drawRipples(timestamp) {
      for (let i = ripples.length - 1; i >= 0; i--) {
        const ring = ripples[i];
        const age = timestamp - ring.birthTime;
        const progress = age / RING_LIFETIME_MS;

        if (progress >= 1) {
          ripples.splice(i, 1);
          continue;
        }

        const eased = 1 - Math.pow(1 - progress, 2); // ease-out expansion
        const dir = ring.direction ?? 1;
        const radius = ring.startRadius + dir * RING_EXPAND_SPEED * (age / 1000);
        if (radius <= 2) { ripples.splice(i, 1); continue; } // T10: inward ring reached centre
        const opacity = (1 - eased) * (0.4 + ring.amplitude * 0.6);
        const thickness = 1.5 + ring.amplitude * 3 * (1 - progress);
        const wobbleAmp = ring.amplitude * 7 * (1 - progress);
        const wobbleFreq = WOBBLE_FREQ_BASE + Math.round(ring.amplitude * 6);

        ctx.beginPath();
        ctx.lineWidth = thickness;
        ctx.strokeStyle = getRippleColour(ring.amplitude, opacity);

        const steps = 120;
        for (let s = 0; s <= steps; s++) {
          const angle = (s / steps) * Math.PI * 2;
          const wobble = Math.sin(angle * wobbleFreq + ring.wobbleOffset + timestamp * ring.wobbleSpeed * 0.001) * wobbleAmp;
          const r = radius + wobble;
          const x = ring.x + Math.cos(angle) * r;
          const y = ring.y + Math.sin(angle) * r;
          s === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }

    function synthesiseIR(actx) {
      const duration = 3.5;
      const sampleRate = actx.sampleRate;
      const length = Math.floor(sampleRate * duration);
      const buffer = actx.createBuffer(2, length, sampleRate);
      for (let c = 0; c < 2; c++) {
        const data = buffer.getChannelData(c);
        for (let i = 0; i < length; i++) {
          const t = i / sampleRate;
          const decay = Math.exp(-2.5 * t);
          const density = t < 0.05 ? 1.0 : 0.8; // was 1.5/1.0 — reduced early burst
          data[i] = (Math.random() * 2 - 1) * decay * density;
        }
      }
      return buffer;
    }

    // Returns { echoInput, masterGain }. Connect your source to echoInput.
    function buildEchoChain(actx) {
      const NUM_TAPS = 4;
      const TAP_INTERVAL = 0.3;

      const echoInput = actx.createGain();
      const convolverInput = actx.createGain();
      const convolver = actx.createConvolver();
      convolver.buffer = synthesiseIR(actx);
      const masterGain = actx.createGain();
      masterGain.gain.value = 0.38; // was 0.8 — reduced to prevent feedback

      // Hard limiter: stops runaway gain on devices without headphones
      const limiter = actx.createDynamicsCompressor();
      limiter.threshold.value = -6;  // dBFS
      limiter.knee.value = 0;
      limiter.ratio.value = 20;      // near-brickwall
      limiter.attack.value = 0.001;
      limiter.release.value = 0.15;

      for (let i = 0; i < NUM_TAPS; i++) {
        const delay = actx.createDelay(5.0);
        delay.delayTime.value = TAP_INTERVAL * (i + 1);
        const tapGain = actx.createGain();
        tapGain.gain.value = Math.pow(0.5, i + 1);
        echoInput.connect(delay);
        delay.connect(tapGain);
        tapGain.connect(convolverInput);
      }

      convolverInput.connect(convolver);
      convolver.connect(masterGain);
      masterGain.connect(limiter);
      limiter.connect(actx.destination);

      return { echoInput, masterGain };
    }

    // T7: Synthesised fallback

    function fireSynthBurst(amplitude) {
      if (!audioCtx || !synthEchoInput) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 80 + amplitude * 40; // 80–120 Hz dark rumble
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(amplitude * 0.7, now + 0.025);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4 + amplitude * 1.2);
      osc.connect(gain);
      gain.connect(synthEchoInput);
      osc.start(now);
      osc.stop(now + 0.4 + amplitude * 1.2 + 0.1);
      // Drive ripples and haptics directly (no analyser in synth mode)
      spawnRipple(amplitude);
      vibrateScream(amplitude);
      lastSoundTime = performance.now(); // T10: synth taps also break silence
    }

    function addSynthTapHandler() {
      let tapStart = null;
      canvas.addEventListener('pointerdown', () => { tapStart = performance.now(); });
      canvas.addEventListener('pointerup', () => {
        if (tapStart === null || audioMode !== 'synth-fallback') return;
        const duration = performance.now() - tapStart;
        tapStart = null;
        // Map 50ms–1500ms → amplitude 0.2–1.0
        const amplitude = Math.min(1, Math.max(0.2, (duration - 50) / 1450));
        fireSynthBurst(amplitude);
      });
    }

    async function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new AudioContext();
        await audioCtx.resume(); // required for Safari and Chrome
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
          }
        });
        micStream = stream;
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.8;
        source.connect(analyser);
        const { echoInput, masterGain } = buildEchoChain(audioCtx);
        source.connect(echoInput);
        echoMasterGain = masterGain;
        setupAmbientHum(audioCtx);
        audioMode = 'active';
        console.log('[void] audio pipeline active');
        onPermissionGranted();
      } catch (err) {
        console.warn('[void] mic unavailable, switching to synth fallback:', err.name);
        if (!audioCtx) {
          audioCtx = new AudioContext();
          await audioCtx.resume();
        }
        const { echoInput, masterGain } = buildEchoChain(audioCtx);
        synthEchoInput = echoInput;
        echoMasterGain = masterGain;
        setupAmbientHum(audioCtx);
        audioMode = 'synth-fallback';
        console.log('[void] synth fallback pipeline active');
        onPermissionDenied();
      }
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);
    }

    window.addEventListener('resize', resize);
    resize();

    canvas.addEventListener('click', initAudio, { once: true });

    function render(timestamp) {
      // T8: background breathing — slow sine modulation on blue channel, never pure black
      const breathe = REDUCED_MOTION ? 0 : (Math.sin(timestamp * 0.0003) * 0.5 + 0.5); // 0–1, ~20s period
      const bgB = Math.round(5 + breathe * 5); // 5–10 range
      ctx.fillStyle = `rgb(1,0,${bgB})`;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      // T8: ambient drifting particles
      drawParticles(timestamp);

      // T10: update silence factor + hum pitch every frame
      if (audioMode !== 'uninitialised') updateSilenceFactor(timestamp);

      // T10: void-breath — inward ripple + haptic during deep silence
      if (!REDUCED_MOTION && silenceFactor > 0.5 && audioMode !== 'uninitialised'
          && timestamp - lastBreathTime > SILENCE_BREATH_INTERVAL_MS) {
        lastBreathTime = timestamp;
        spawnRipple(0.3 + silenceFactor * 0.4, -1);
        vibrateBreath();
      }

      // T4: volume analysis – updates smoothedRMS, normalisedVolume, isScreaming
      if (audioMode === 'active') {
        updateVolumeAnalysis();
      }

      // T5 + T9: spawn ripple and haptic on scream onset (rising edge) — mic mode only
      // (synth mode handles these directly in fireSynthBurst)
      if (audioMode === 'active' && isScreaming && !prevIsScreaming) {
        spawnRipple(normalisedVolume);
        vibrateScream(normalisedVolume);
      }
      prevIsScreaming = isScreaming;

      // Center glow: responds to any mic input, not just screams
      drawCenterGlow();

      // T5: draw active ripple rings
      drawRipples(timestamp);

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
